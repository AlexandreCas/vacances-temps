<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1118" />
  <title>El Temps del Viatge · Japó + Maldives</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Zen+Old+Mincho:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <div>
        <p class="trip-eyebrow">旅 · El diari del temps</p>
        <h1>Japó &amp; Maldives</h1>
      </div>
      <div class="topbar-right">
        <button id="fx-btn" class="fx-btn" type="button" aria-label="Calculadora ien / euro">¥€</button>
        <div id="banner" class="banner"></div>
      </div>
    </div>
    <p class="trip-dates">23 juny — 12 juliol 2026</p>
  </header>

  <nav id="selector" class="selector" aria-label="Selecció de dia"></nav>

  <div class="tabs">
    <button id="tab-detall" class="tab actiu">El dia</button>
    <button id="tab-resum" class="tab">La ruta · 10 dies</button>
  </div>

  <main id="contingut" class="contingut"></main>

  <footer class="peu">
    <p>Dades de <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a>.
    Fiable a ~7-10 dies; els dies llunyans s'afinen sols.</p>
  </footer>

  <div id="fx-modal" class="fx-modal" hidden>
    <div class="fx-backdrop" data-close></div>
    <div class="fx-card" role="dialog" aria-modal="true" aria-label="Calculadora ien / euro">
      <button class="fx-x" type="button" data-close aria-label="Tancar">&times;</button>
      <p class="kicker">Canvi ¥ / €</p>
      <label class="fx-field">
        <span>Iens ¥</span>
        <input id="fx-jpy" type="number" inputmode="decimal" placeholder="0" />
      </label>
      <div class="fx-eq">=</div>
      <label class="fx-field">
        <span>Euros €</span>
        <input id="fx-eur" type="number" inputmode="decimal" placeholder="0" />
      </label>
      <p id="fx-rate" class="fx-rate">Carregant tipus de canvi…</p>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
